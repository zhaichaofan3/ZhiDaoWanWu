name: 构建并部署到 Sealos

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 拉取代码
        run: |
          git clone https://github.com/${{ github.repository }} .
          git checkout ${{ github.sha }}

      - name: 构建 Docker 镜像
        run: |
          docker build -t campus-second-hand-market:latest .

      - name: 安装 Sealos CLI
        run: |
          curl -sfL https://raw.githubusercontent.com/labring/sealos/main/scripts/install.sh | sh -s v4.3.1
          sealos version

      - name: 登录 Sealos
        run: |
          sealos login sealos.cloud -u ${{ secrets.SEALOS_USERNAME }} -p ${{ secrets.SEALOS_TOKEN }}

      - name: 部署到 Sealos
        run: |
          sealos run https://github.com/${{ github.repository }} \
            --name my-fullstack-app \
            --port 4000:4000 \
            --env NODE_ENV=production \
            --env PORT=4000